<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        if (!window.location.pathname.endsWith('/') && !window.location.pathname.endsWith('.html')) {
            window.location.replace(window.location.pathname + '/' + window.location.search + window.location.hash);
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CardVault</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsfeat/0.0.8/jsfeat-min.js"></script>
    <style>
        :root { --sat: env(safe-area-inset-top); --sab: env(safe-area-inset-bottom); }
        body { overscroll-behavior: none; -webkit-tap-highlight-color: transparent; }
        .view-section { height: 100dvh; display: flex; flex-direction: column; padding-top: var(--sat); }
        .cropper-container { position: relative; width: 100%; height: 100%; background: #000; overflow: hidden; }
        #cameraVideo, #captureCanvas { width: 100%; height: 100%; object-fit: contain; position: absolute; top: 0; left: 0; }
        #captureCanvas { z-index: 10; touch-action: none; }
        .pb-safe { padding-bottom: calc(var(--sab) + 4rem); }
        
        /* Bottom Sheet Styles */
        #cardBottomSheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top-left-radius: 1.5rem;
            border-top-right-radius: 1.5rem;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
            max-height: 90dvh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 -10px 25px rgba(0,0,0,0.1);
        }
        #cardBottomSheet.open { transform: translateY(0); }
        .sheet-handle { width: 40px; height: 4px; background: #e5e7eb; border-radius: 2px; margin: 12px auto; shrink-0; }
        .sheet-content { flex: 1; overflow-y: auto; padding-bottom: var(--sab); }
        #sheetOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 90;
        }
        #sheetOverlay.show { opacity: 1; pointer-events: auto; }
    </style>
</head>
<body class="bg-gray-100 h-[100dvh] overflow-hidden font-sans">

    <!-- Header (Hidden in Capture) -->
    <header id="mainHeader" class="bg-blue-800 text-white p-4 pt-[calc(var(--sat)+1rem)] flex justify-between items-center shadow-md shrink-0 z-30">
        <div class="text-xl font-bold flex items-center gap-2">
            <span class="iconify" data-icon="mdi:cards-playing"></span>
            CardVault
        </div>
        <button data-nav="settingsView" class="p-2 rounded hover:bg-blue-700">
            <span class="iconify" data-icon="mdi:cog" data-width="24"></span>
        </button>
    </header>

    <!-- Main Content Area -->
    <main class="flex-1 relative">
        
        <!-- Dashboard View -->
        <section id="dashboardView" class="view-section p-4 space-y-4">
            <h2 class="text-2xl font-bold text-gray-800">Dashboard</h2>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-blue-500">
                    <p class="text-xs text-gray-400 uppercase font-bold tracking-wider">Total Cards</p>
                    <p class="text-3xl font-black text-gray-800" id="totalCardsStat">0</p>
                </div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-green-500">
                    <p class="text-xs text-gray-400 uppercase font-bold tracking-wider">Est. Value</p>
                    <p class="text-3xl font-black text-green-600" id="totalValueStat">$0</p>
                </div>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow-sm flex-1 min-h-0">
                <canvas id="valueChart"></canvas>
            </div>
            <div class="h-20"></div> <!-- Spacer for bottom nav -->
        </section>

        <!-- Collection View -->
        <section id="collectionView" class="view-section hidden p-4">
            <div class="flex flex-col space-y-4 mb-6">
                <h2 class="text-2xl font-bold text-gray-800">My Collection</h2>
                <div class="flex flex-col gap-2">
                    <div class="relative">
                        <span class="iconify absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400" data-icon="mdi:magnify"></span>
                        <input type="text" id="searchInput" placeholder="Search collection..." class="w-full pl-10 pr-4 py-3 bg-white border-none rounded-2xl shadow-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div class="flex gap-2">
                        <select id="sportFilter" class="flex-1 bg-white border-none rounded-xl px-3 py-2 shadow-sm outline-none text-sm">
                            <option value="All">All Sports</option>
                            <option value="Baseball">Baseball</option>
                            <option value="Basketball">Basketball</option>
                            <option value="Football">Football</option>
                            <option value="Soccer">Soccer</option>
                            <option value="Hockey">Hockey</option>
                        </select>
                        <select id="sortOrder" class="flex-1 bg-white border-none rounded-xl px-3 py-2 shadow-sm outline-none text-sm">
                            <option value="newest">Newest</option>
                            <option value="valueHigh">Value</option>
                        </select>
                    </div>
                </div>
            </div>
            <div id="collectionGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4 pb-24 overflow-y-auto"></div>
        </section>

        <!-- Capture View -->
        <section id="captureView" class="view-section hidden !p-0 bg-black text-white">
            <div class="cropper-container">
                <video id="cameraVideo" autoplay playsinline muted></video>
                <canvas id="captureCanvas"></canvas>
                
                <!-- Floating Controls -->
                <div class="absolute top-[var(--sat)] left-0 right-0 p-4 flex justify-between items-center z-20">
                    <button data-nav="dashboardView" class="bg-black/40 backdrop-blur-md p-3 rounded-full text-white shadow-lg">
                        <span class="iconify" data-icon="mdi:close"></span>
                    </button>
                    <div id="detectionStatus" class="bg-blue-600/80 backdrop-blur-md px-4 py-1.5 rounded-full text-xs font-bold shadow-lg animate-pulse">
                        Scanning for cards...
                    </div>
                    <div class="flex gap-2">
                        <label class="bg-black/40 backdrop-blur-md p-3 rounded-full text-white shadow-lg cursor-pointer flex items-center justify-center">
                            <span class="iconify" data-icon="mdi:image-plus"></span>
                            <input type="file" accept="image/*" class="hidden" id="uploadPhotoInput">
                        </label>
                        <button id="toggleAutoBtn" class="bg-black/40 backdrop-blur-md p-3 rounded-full text-white shadow-lg">
                            <span class="iconify" data-icon="mdi:auto-fix"></span>
                        </button>
                    </div>
                </div>

                <div class="absolute bottom-24 left-0 right-0 p-6 flex justify-around items-center z-20">
                    <button id="retakePhotoBtn" class="hidden bg-gray-800/80 backdrop-blur-md p-4 rounded-full text-white shadow-lg">
                        <span class="iconify text-2xl" data-icon="mdi:refresh"></span>
                    </button>
                    <button id="takePhotoBtn" class="bg-white p-1 rounded-full shadow-[0_0_0_4px_rgba(255,255,255,0.3)] transform active:scale-95 transition-transform">
                        <div class="w-16 h-16 bg-white border-4 border-black/10 rounded-full"></div>
                    </button>
                    <button id="processCardsBtn" class="hidden bg-green-600/80 backdrop-blur-md p-4 rounded-full text-white shadow-lg">
                        <span class="iconify text-2xl" data-icon="mdi:check-bold"></span>
                    </button>
                </div>
            </div>
        </section>

        <!-- Settings View -->
        <section id="settingsView" class="view-section hidden p-6 space-y-6">
            <h2 class="text-2xl font-bold text-gray-800">Settings</h2>
            <div class="bg-white p-6 rounded-3xl shadow-sm space-y-4">
                <h3 class="font-bold text-gray-700 flex items-center gap-2">
                    <span class="iconify" data-icon="mdi:key"></span> API Configuration
                </h3>
                <input type="password" id="apiKeyInput" class="w-full bg-gray-50 border-none rounded-2xl p-4 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Gemini API Key">
                <div class="flex flex-col gap-1 mt-2">
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest px-1">AI Model</label>
                    <select id="modelSelect" class="w-full bg-gray-50 border-none rounded-2xl p-4 font-bold text-gray-800 outline-none">
                        <option value="">Enter API Key to load models...</option>
                    </select>
                </div>
                <button id="saveSettingsBtn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-blue-200 shadow-lg mt-2">Save Settings</button>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow-sm space-y-4">
                <h3 class="font-bold text-gray-700 flex items-center gap-2">
                    <span class="iconify" data-icon="mdi:database"></span> Data Backup
                </h3>
                <button id="exportDataBtn" class="w-full bg-gray-50 text-blue-600 py-4 rounded-2xl font-bold flex items-center justify-center gap-2 border border-blue-100">
                    <span class="iconify" data-icon="mdi:download"></span> Export JSON
                </button>
                <label class="w-full bg-gray-50 text-gray-600 py-4 rounded-2xl font-bold flex items-center justify-center gap-2 border border-gray-200 cursor-pointer">
                    <span class="iconify" data-icon="mdi:upload"></span> Import JSON
                    <input type="file" id="importFileInput" class="hidden" accept=".json">
                </label>
            </div>
        </section>

    </main>

    <!-- Bottom Navigation -->
    <nav id="bottomNav" class="bg-white/80 backdrop-blur-xl border-t border-gray-100 flex justify-around p-2 pb-[calc(var(--sab)+0.5rem)] fixed bottom-0 w-full z-40">
        <button data-nav="dashboardView" class="flex flex-col items-center p-2 text-blue-600 w-1/4">
            <span class="iconify text-2xl" data-icon="mdi:home-variant"></span>
            <span class="text-[10px] mt-1 font-bold">Home</span>
        </button>
        <button data-nav="captureView" class="flex flex-col items-center p-2 text-gray-400 w-1/4">
            <div class="bg-blue-600 rounded-2xl p-3 -mt-10 shadow-xl shadow-blue-200 border-4 border-white text-white">
                <span class="iconify text-3xl" data-icon="mdi:camera-plus"></span>
            </div>
            <span class="text-[10px] mt-1 font-bold">Scan</span>
        </button>
        <button data-nav="collectionView" class="flex flex-col items-center p-2 text-gray-400 w-1/4">
            <span class="iconify text-2xl" data-icon="mdi:cards-playing-outline"></span>
            <span class="text-[10px] mt-1 font-bold">Vault</span>
        </button>
    </nav>

    <!-- Bottom Sheet for Details -->
    <div id="sheetOverlay"></div>
    <div id="cardBottomSheet">
        <div class="sheet-handle"></div>
        <div class="sheet-content">
            <div class="p-4 flex flex-col items-center">
                <img id="detailImage" src="" class="w-full max-w-xs h-64 object-contain rounded-3xl shadow-xl mb-6 bg-gray-50">
                <div class="w-full space-y-4 px-2">
                    <div class="flex flex-col gap-1">
                        <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest px-1">Player Name</label>
                        <input type="text" id="editPlayer" class="w-full bg-gray-50 border-none rounded-2xl p-4 font-bold text-gray-800">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="flex flex-col gap-1">
                            <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest px-1">Sport</label>
                            <select id="editSport" class="w-full bg-gray-50 border-none rounded-2xl p-4 font-bold text-gray-800 outline-none">
                                <option value="Baseball">Baseball</option>
                                <option value="Basketball">Basketball</option>
                                <option value="Football">Football</option>
                                <option value="Soccer">Soccer</option>
                                <option value="Hockey">Hockey</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="flex flex-col gap-1">
                            <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest px-1">Year</label>
                            <input type="text" id="editYear" class="w-full bg-gray-50 border-none rounded-2xl p-4 font-bold text-gray-800">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="flex flex-col gap-1">
                            <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest px-1">Value ($)</label>
                            <input type="number" id="editValue" step="0.01" class="w-full bg-gray-50 border-none rounded-2xl p-4 font-bold text-green-600">
                        </div>
                        <div class="flex flex-col gap-1">
                            <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest px-1">Condition</label>
                            <input type="text" id="editCondition" class="w-full bg-gray-50 border-none rounded-2xl p-4 font-bold text-gray-800">
                        </div>
                    </div>
                    <div class="flex gap-3 pt-4">
                        <button id="cancelEditBtn" class="flex-1 py-4 bg-gray-100 text-gray-600 rounded-2xl font-bold">Cancel</button>
                        <button id="saveEditBtn" class="flex-2 py-4 bg-blue-600 text-white rounded-2xl font-bold shadow-lg shadow-blue-100">Save</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Feedback UI -->
    <div id="toast" class="hidden"></div>
    <div id="loadingOverlay" class="hidden fixed inset-0 bg-black/90 backdrop-blur-md z-[110] flex flex-col items-center justify-center text-white p-10 text-center">
        <div class="relative w-24 h-24 mb-6">
            <div class="absolute inset-0 border-4 border-blue-500/20 rounded-full"></div>
            <div class="absolute inset-0 border-4 border-blue-500 rounded-full border-t-transparent animate-spin"></div>
            <span class="iconify absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-4xl text-blue-500" data-icon="mdi:creation"></span>
        </div>
        <p id="loadingText" class="text-xl font-bold mb-2">Analyzing collection...</p>
        <p class="text-gray-400 text-sm">Our AI is identifying your cards and researching market values.</p>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
