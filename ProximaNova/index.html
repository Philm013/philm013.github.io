<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Project Nova v23 - Strategic Expansion</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a202c"/>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app-container">
        <div id="game-world">
            <div id="top-bar"></div>
            <!-- --- CANVAS RENDERER CHANGE START --- -->
            <div id="grid-container">
                <!-- Layers are drawn bottom-to-top -->
                <canvas id="terrain-canvas"></canvas>      <!-- Static terrain -->
                <canvas id="building-canvas"></canvas>     <!-- Buildings, fog, static effects like shields -->
                <canvas id="dynamic-canvas"></canvas>      <!-- Moving units, projectiles, explosions -->
                <canvas id="interaction-canvas"></canvas>  <!-- Hover/placement ghost, selection boxes -->
            </div>
            <!-- --- CANVAS RENDERER CHANGE END --- -->
            <div id="placement-banner"></div>
            <div id="objective-banner"></div>
            <div id="dust-storm-overlay"></div>
            <div id="solar-flare-overlay"></div>
            <div id="magnetic-storm-overlay"></div>
            
            <div id="alerts-container"></div>
            
            <div id="minimap-container">
                <canvas id="minimap-canvas"></canvas>
            </div>
            <div id="event-log-container">
                <div class="event-log-header">
                    <span>Event Log</span>
                    <button id="log-toggle-btn">▲</button>
                </div>
                <div id="event-log"></div>
            </div>

            <div id="selection-panel">
                <div class="modal-handle hidden-desktop"></div>
                <div id="selection-icon"></div>
                <div id="selection-details">
                    <div id="selection-title"></div>
                    <div id="selection-health"><div id="selection-health-bar"></div></div>
                    <div id="selection-stats"></div>
                    <div id="selection-actions"></div>
                </div>
            </div>
        </div>

        <div id="modal-container" class="modal-overlay">
            <div id="build-modal" class="modal-content"><div class="modal-handle"></div><div class="modal-header"><div class="modal-title">Build Menu</div><button class="modal-close-btn">×</button></div><div id="build-list"></div></div>
            <div id="team-modal" class="modal-content"><div class="modal-handle"></div><div class="modal-header"><div class="modal-title">Team & Artifacts</div><button class="modal-close-btn">×</button></div><div id="specialist-list"></div></div>
            <div id="research-modal" class="modal-content"><div class="modal-handle"></div><div class="modal-header"><div class="modal-title">Research</div><button class="modal-close-btn">×</button></div><div id="research-list"></div></div>
            <div id="objectives-modal" class="modal-content"><div class="modal-handle"></div><div class="modal-header"><div class="modal-title">Mission Directives</div><button class="modal-close-btn">×</button></div><div id="objectives-list"></div></div>
            <div id="remote-build-modal" class="modal-content"><div class="modal-handle"></div><div class="modal-header"><div class="modal-title">Constructor: Remote Build</div><button class="modal-close-btn">×</button></div><div id="remote-build-list"></div></div>
            <div id="end-game-modal" class="modal-content"><div class="modal-handle"></div></div>
            <!-- --- GEMINI INTEGRATION START --- -->
            <div id="advisor-modal" class="modal-content"><div class="modal-handle"></div><div class="modal-header"><div class="modal-title">Strategic Advisor</div><button class="modal-close-btn">×</button></div><div id="advisor-content"></div></div>
            <div id="dilemma-modal" class="modal-content"><div class="modal-handle"></div><div class="modal-header"><div id="dilemma-title" class="modal-title"></div><button class="modal-close-btn">×</button></div><div id="dilemma-content"></div></div>
            <!-- --- GEMINI INTEGRATION END --- -->
        </div>
        
        <nav id="bottom-nav">
            <button class="nav-btn" data-modal="build-modal">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
                Build
            </button>
            <button class="nav-btn" data-modal="team-modal">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                Team
            </button>
            <button class="nav-btn" data-modal="research-modal">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"></path><path d="M22 12A10 10 0 0 0 12 2v10z"></path></svg>
                Research
            </button>
            <button class="nav-btn" id="objectives-nav-btn" data-modal="objectives-modal">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"></path><path d="M2 12h20"></path></svg>
                Objectives
            </button>
            <!-- --- GEMINI INTEGRATION START --- -->
            <button class="nav-btn" id="advisor-btn" data-modal="advisor-modal">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                Advisor
            </button>
            <!-- --- GEMINI INTEGRATION END --- -->
        </nav>
    </div>

    <!-- Audio files for immersion -->
    <audio id="audio-build" src="https://www.soundjay.com/buttons/sounds/button-4.mp3" preload="auto"></audio>
    <audio id="audio-click" src="https://www.soundjay.com/buttons/sounds/button-7.mp3" preload="auto"></audio>
    <audio id="audio-error" src="https://www.soundjay.com/buttons/sounds/button-10.mp3" preload="auto"></audio>
    <audio id="audio-alert" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3" preload="auto"></audio>
    <audio id="audio-turret" src="https://www.soundjay.com/machine/sounds/machine-gun-01.mp3" preload="auto"></audio>
    <audio id="audio-success" src="https://www.soundjay.com/buttons/sounds/button-2.mp3" preload="auto"></audio>
    <audio id="audio-explosion" src="https://www.soundjay.com/mechanical/sounds/bomb-02.mp3" preload="auto"></audio>
    
    <!-- Data definitions must be loaded before the main game logic -->
    <script src="js/data.js"></script>
    <!-- Gemini SDK via CDN and our custom service wrapper -->
    <script type="module" src="js/gemini-service.js"></script>
    <script type="module" src="js/game.js"></script>
</body>
</html>
