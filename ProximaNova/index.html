<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Project Nova v23 - Strategic Expansion</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#05080f"/>
    <script>
        // Ensure trailing slash for correct relative path resolution
        if (!window.location.pathname.endsWith('/') && !window.location.pathname.endsWith('.html')) {
            window.location.replace(window.location.pathname + '/' + window.location.search + window.location.hash);
        }
    </script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app-container">
        <!-- TOP BAR: Managed by renderTopBar in game.js -->
        <div id="top-bar"></div>
        
        <!-- SIDE NAVIGATION: Desktop sidebar, Mobile bottom-nav -->
        <nav id="bottom-nav">
            <button class="nav-btn" data-modal="build-modal">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
                <span>Build</span>
            </button>
            <button class="nav-btn" data-modal="team-modal">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                <span>Team</span>
            </button>
            <button class="nav-btn" data-modal="research-modal">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"></path><path d="M22 12A10 10 0 0 0 12 2v10z"></path></svg>
                <span>Research</span>
            </button>
            <button class="nav-btn" id="objectives-nav-btn" data-modal="objectives-modal">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"></path><path d="M2 12h20"></path></svg>
                <span>Objectives</span>
            </button>
            <button class="nav-btn" id="advisor-btn" data-modal="advisor-modal">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                <span>Advisor</span>
            </button>
        </nav>

        <!-- MAIN GAME AREA -->
        <div id="game-world">
            <div id="grid-container">
                <canvas id="terrain-canvas"></canvas>
                <canvas id="building-canvas"></canvas>
                <canvas id="dynamic-canvas"></canvas>
                <canvas id="interaction-canvas"></canvas>
            </div>
            
            <!-- Weather / Effect Overlays (pointer-events: none) -->
            <div id="dust-storm-overlay"></div>
            <div id="solar-flare-overlay"></div>
            <div id="magnetic-storm-overlay"></div>
            
            <!-- Gameplay HUD elements -->
            <div id="placement-banner" class="hidden"></div>
            <div id="objective-banner" class="hidden"></div>
            <div id="alerts-container"></div>
            
            <!-- Selection Panel: Managed by updateSelectionPanel in game.js -->
            <div id="selection-panel">
                <div class="modal-handle"></div>
                <div id="selection-icon"></div>
                <div id="selection-details">
                    <div id="selection-title"></div>
                    <!-- Restoration of missing health bar -->
                    <div id="selection-health" class="health-bar-container">
                        <div id="selection-health-bar" class="health-bar-fill"></div>
                    </div>
                    <div id="selection-stats"></div>
                    <div id="selection-actions"></div>
                </div>
            </div>
        </div>

        <!-- RIGHT PANEL: Minimap & Logs -->
        <div id="right-ui-panel">
            <div id="minimap-container">
                <canvas id="minimap-canvas"></canvas>
            </div>
            <div id="event-log-container">
                <div class="event-log-header">
                    <span>MISSION LOG</span>
                    <button id="log-toggle-btn">▲</button>
                </div>
                <div id="event-log"></div>
            </div>
        </div>

        <!-- MODAL SYSTEM -->
        <div id="modal-container" class="modal-overlay">
            <div id="build-modal" class="modal-content">
                <div class="modal-handle"></div>
                <div class="modal-header">
                    <div class="modal-title">Engineering Bay</div>
                    <button class="modal-close-btn">&times;</button>
                </div>
                <div id="build-list"></div>
            </div>
            <div id="team-modal" class="modal-content">
                <div class="modal-handle"></div>
                <div class="modal-header">
                    <div class="modal-title">Colony Personnel</div>
                    <button class="modal-close-btn">&times;</button>
                </div>
                <div id="specialist-list"></div>
            </div>
            <div id="research-modal" class="modal-content">
                <div class="modal-handle"></div>
                <div class="modal-header">
                    <div class="modal-title">Technology Matrix</div>
                    <button class="modal-close-btn">&times;</button>
                </div>
                <div id="research-list"></div>
            </div>
            <div id="objectives-modal" class="modal-content">
                <div class="modal-handle"></div>
                <div class="modal-header">
                    <div class="modal-title">Mission Directives</div>
                    <button class="modal-close-btn">&times;</button>
                </div>
                <div id="objectives-list"></div>
            </div>
            <div id="remote-build-modal" class="modal-content">
                <div class="modal-handle"></div>
                <div class="modal-header">
                    <div class="modal-title">Constructor Control</div>
                    <button class="modal-close-btn">&times;</button>
                </div>
                <div id="remote-build-list"></div>
            </div>
            <div id="advisor-modal" class="modal-content">
                <div class="modal-handle"></div>
                <div class="modal-header">
                    <div class="modal-title">Strategic Advisor</div>
                    <button class="modal-close-btn">&times;</button>
                </div>
                <div id="advisor-content"></div>
            </div>
            <div id="dilemma-modal" class="modal-content">
                <div class="modal-handle"></div>
                <div class="modal-header">
                    <div id="dilemma-title" class="modal-title">Critical Event</div>
                    <button class="modal-close-btn">&times;</button>
                </div>
                <div id="dilemma-content"></div>
            </div>
            <div id="settings-modal" class="modal-content">
                <div class="modal-handle"></div>
                <div class="modal-header">
                    <div class="modal-title">Settings</div>
                    <button class="modal-close-btn">&times;</button>
                </div>
                <div id="settings-content" style="display: flex; flex-direction: column; gap: 15px;">
                    <p style="color: var(--text-muted); font-size: 0.9em;">Configure your Gemini AI settings. Your data is stored locally in your browser.</p>
                    
                    <div style="display: flex; flex-direction: column; gap: 5px;">
                        <label style="font-size: 0.8rem; color: var(--accent-color);">API KEY</label>
                        <input type="password" id="api-key-input" placeholder="Enter Gemini API Key" style="width: 100%; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid var(--border-color); color: var(--text-main); border-radius: 6px; font-family: inherit; font-size: 1rem;">
                    </div>

                    <div style="display: flex; flex-direction: column; gap: 5px;">
                        <label style="font-size: 0.8rem; color: var(--accent-color);">AI MODEL</label>
                        <select id="model-select" style="width: 100%; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid var(--border-color); color: var(--text-main); border-radius: 6px; font-family: inherit; font-size: 1rem;">
                            <option value="gemini-2.0-flash">Gemini 2.0 Flash (Fastest)</option>
                            <option value="gemini-2.0-flash-lite-preview-02-05">Gemini 2.0 Flash-Lite (Economical)</option>
                            <option value="gemini-1.5-pro">Gemini 1.5 Pro (Most Intelligent)</option>
                            <option value="gemini-1.5-flash">Gemini 1.5 Flash (Balanced)</option>
                        </select>
                    </div>

                    <button id="save-settings-btn" class="button">Save Settings</button>
                    <div id="settings-message" style="font-size: 0.85em; color: var(--success-color); display: none;">Settings saved!</div>
                </div>
            </div>
            <div id="end-game-modal" class="modal-content">
                <div class="modal-handle"></div>
                <div id="end-game-content"></div>
            </div>
        </div>
    </div>

    <!-- AUDIO -->
    <audio id="audio-build" src="https://www.soundjay.com/buttons/sounds/button-4.mp3" preload="auto"></audio>
    <audio id="audio-click" src="https://www.soundjay.com/buttons/sounds/button-7.mp3" preload="auto"></audio>
    <audio id="audio-error" src="https://www.soundjay.com/buttons/sounds/button-10.mp3" preload="auto"></audio>
    <audio id="audio-alert" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3" preload="auto"></audio>
    <audio id="audio-turret" src="https://www.soundjay.com/machine/sounds/machine-gun-01.mp3" preload="auto"></audio>
    <audio id="audio-success" src="https://www.soundjay.com/buttons/sounds/button-2.mp3" preload="auto"></audio>
    <audio id="audio-explosion" src="https://www.soundjay.com/mechanical/sounds/bomb-02.mp3" preload="auto"></audio>
    
    <!-- SCRIPTS -->
    <script src="js/data.js"></script>
    <script type="module" src="js/gemini-service.js"></script>
    <script type="module" src="js/game.js"></script>
</body>
</html>
