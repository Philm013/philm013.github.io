@layer base {
    body {

    .container-custom {

    .btn-pill-black {

    .btn-pill-gray {

    .btn-pill-white {
        @apply px-6 py-2.5 bg-white text-ollama-mid border border-ollama-border rounded-full transition-all duration-200 flex items-center justify-center gap-2 font-medium hover:bg-ollama-snow active:scale-[0.98];

    .filter-pill {
        @apply px-4 py-1.5 rounded-full text-sm font-medium transition-all duration-200 bg-transparent text-ollama-stone hover:text-ollama-black;
    }
    .filter-pill.active {

    .project-card {

    .tag-pill {

    .tech-pill {
        @apply px-2 py-0.5 rounded-full bg-ollama-snow border border-ollama-gray text-ollama-stone text-[10px] font-medium;
    }
}

/* Radical Minimalism: No Shadows */
* { box-shadow: none !important; }

/* Custom scrollbar */

const grid = document.getElementById('projects-grid');
const filterBtns = document.querySelectorAll('.filter-pill');

function renderProjects(filter = 'all') {
    grid.innerHTML = '';
    
    const filtered = filter === 'all' 
        ? PROJECTS 
        : PROJECTS.filter(p => p.category === filter);

    filtered.forEach((p, idx) => {
        const card = document.createElement('div');
        card.className = 'project-card';
        
        card.innerHTML = `
            <div class="flex items-start justify-between gap-4">
                <div class="space-y-4 flex-grow">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-xl bg-ollama-snow border border-ollama-gray flex items-center justify-center">
                            <span class="iconify text-xl text-ollama-black" data-icon="${p.icon}"></span>
                        </div>
                        <h3 class="text-xl font-medium">${p.title}</h3>
                    </div>
                    <p class="text-ollama-stone leading-relaxed">${p.description}</p>
                    
                    <div class="flex flex-wrap gap-1.5">
                        ${p.techStack.map(tech => `<span class="tech-pill">${tech}</span>`).join('')}
                    </div>
                </div>
            </div>
            
            <div class="mt-auto pt-6 flex flex-wrap items-center justify-between gap-4 border-t border-ollama-gray">
                <div class="flex gap-1.5">
                    ${p.tags.map(tag => `<span class="tag-pill">${tag}</span>`).join('')}
                </div>
                <div class="flex gap-3">
                    <a href="${p.readmePath}" class="btn-pill-white text-xs px-4 py-2">
                        Details
                    </a>
                    <a href="${p.launchPath}" target="_blank" class="btn-pill-black text-xs px-4 py-2">
                        Launch
                    </a>
                </div>
            </div>
        `;
        
        grid.appendChild(card);
    });
}

// Filter Logic

        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderProjects(btn.dataset.filter);
    });
});
