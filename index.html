<!DOCTYPE html>
<html>
<head>
  <title>Phil's Web App Portfolio</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body {
      font-family: sans-serif;
      line-height: 1.6;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: left;
    }
    th {
      background-color: #f2f2f2;
    }
  </style>
</head>
<body>
  <div id="content"></div>
  <script>
    fetch('README.md')
      .then(response => response.text())
      .then(text => {
        document.getElementById('content').innerHTML =
          marked.parse(text);
      });
  </script>
</body>
</html>
