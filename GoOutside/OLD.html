<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NatureQuest</title>
    
    <!-- Libraries -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

    <style>
        :root {
            /* Design System Tokens */
            --bg: #f3f4f6;
            --surface: #ffffff;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --primary: #059669; /* Emerald 600 */
            --primary-light: #ecfdf5;
            --accent: #f59e0b; /* Amber 500 */
            --border: #e5e7eb;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); color: var(--text-primary); 
            overflow: hidden; 
            -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
        }

        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24 }

        /* --- LAYOUT & CORE COMPONENTS --- */
        #map { height: 100%; width: 100%; z-index: 1; }
        .leaflet-control-attribution { display: none; }

        .backdrop {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            z-index: 50; opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .backdrop.open { opacity: 1; pointer-events: auto; }

        .modal-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 60; display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
            padding: 20px;
        }
        .modal-container.open { opacity: 1; pointer-events: auto; }

        .modal-content {
            background: var(--surface); border-radius: 24px;
            width: 100%; max-width: 420px;
            box-shadow: var(--shadow-lg);
            transform: scale(0.95); transition: transform 0.3s ease;
        }
        .modal-container.open .modal-content { transform: scale(1); }
        
        .panel-header {
            padding: 16px 24px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .panel-header h2 { margin: 0; font-size: 18px; font-weight: 700; }
        .btn-icon { background: none; border: none; cursor: pointer; color: var(--text-secondary); padding: 4px; }

        /* --- HUD --- */
        #hud {
            position: absolute; inset: 0;
            pointer-events: none; z-index: 10;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        .hud-top, .hud-bottom {
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
            pointer-events: auto;
        }
        
        .hud-bottom { justify-content: center; }

        .btn-hud {
            background: var(--surface); border: 1px solid var(--border);
            width: 56px; height: 56px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: var(--shadow); cursor: pointer; transition: transform 0.1s;
        }
        .btn-hud:active { transform: scale(0.95); }

        #btn-log-sighting {
            width: 72px; height: 72px; background: var(--primary); color: white;
            transform: translateY(-10px); border: 4px solid var(--surface);
            box-shadow: var(--shadow-lg);
        }

        /* --- PROFILE MODAL --- */
        .profile-avatar {
            position: relative; width: 120px; height: 120px;
            margin: -60px auto 16px; border-radius: 50%; border: 5px solid var(--surface);
            background-image: url('https://i.imgur.com/K2fCwI3.png'); /* Placeholder */
            background-size: cover; background-position: center;
        }
        .profile-username { text-align: center; font-size: 24px; font-weight: 800; }
        
        .xp-bar { width: 100%; background: var(--bg); height: 8px; border-radius: 4px; overflow: hidden; margin: 4px 0; }
        .xp-bar-fill { width: 0%; height: 100%; background: var(--primary); transition: width 0.5s ease; }
        .xp-text { font-size: 12px; color: var(--text-secondary); text-align: center; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1px; background: var(--border); margin-top: 24px; border-radius: 0 0 24px 24px; overflow:hidden;}
        .stat-item { background: var(--surface); padding: 16px; text-align: center; }
        .stat-value { font-size: 18px; font-weight: 800; }
        .stat-label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
        
        /* --- FIELD GUIDE & REWARDS MODALS --- */
        .reward-card { background: var(--surface); border: 1px solid var(--border); padding: 20px; border-radius: 16px; margin-bottom: 16px; }
        .streak-days { display: flex; justify-content: space-between; margin-top: 12px; }
        .day-circle { width: 36px; height: 36px; border-radius: 50%; background: var(--bg); color: var(--text-secondary); display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; }
        .day-circle.active { background: var(--primary); color: white; }
        .day-circle span { font-size: 14px; font-weight: 600; }
        
        #fieldGuide .modal-content { height: 85vh; display:flex; flex-direction:column; }
        .fieldguide-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .species-card { border-radius: 16px; overflow: hidden; background: var(--surface); box-shadow: var(--shadow); }
        .species-card-img { height: 100px; background-color: var(--bg); background-size: cover; background-position: center; position: relative; }
        .species-card-info { padding: 12px; }
        .species-card.locked { filter: grayscale(1) opacity(0.8); }
        .rarity-tag { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.5); color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 600; }

        /* --- LOG SIGHTING FORM & GENERIC FORM ELEMENTS --- */
        .form-input, .form-textarea, .form-select {
            width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 16px;
            background: var(--bg); font-family: 'Inter', sans-serif;
        }
        .species-entry { display: flex; align-items: center; gap: 8px; }
        .species-entry input[type="number"] { width: 60px; text-align: center; }
        .btn-full { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 16px; font-size: 16px; font-weight: 700; cursor: pointer; }

        /* --- LOADING SPINNER --- */
        .loader {
            border: 4px solid var(--bg);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div id="map"></div>
    <div id="hud">
        <div class="hud-top">
            <button class="btn-hud" id="btn-profile" onclick="app.ui.openModal('profile')"><span class="material-symbols-outlined">person</span></button>
            <button class="btn-hud" id="btn-rewards" onclick="app.ui.openModal('rewards')"><span class="material-symbols-outlined">workspace_premium</span></button>
        </div>
        <div class="hud-bottom">
            <button class="btn-hud" onclick="app.ui.openModal('fieldGuide')"><span class="material-symbols-outlined">menu_book</span></button>
            <button class="btn-hud" id="btn-log-sighting" onclick="app.ui.openModal('logSighting')"><span class="material-symbols-outlined" style="font-size:32px;">add</span></button>
            <button class="btn-hud"><span class="material-symbols-outlined">inventory_2</span></button>
        </div>
    </div>

    <div id="backdrop" class="backdrop" onclick="app.ui.closeAllModals()"></div>

    <!-- Profile Modal -->
    <div id="profile" class="modal-container">
        <div class="modal-content">
            <div class="panel-header"><h2>Profile</h2><button class="btn-icon" onclick="app.ui.closeAllModals()"><span class="material-symbols-outlined">close</span></button></div>
            <div style="padding: 24px;">
                <div class="profile-avatar"></div>
                <h3 class="profile-username" id="profile-username"></h3>
                <div style="display: flex; gap: 8px; justify-content: center; margin-top: 8px;"><div style="background: var(--primary-light); color: var(--primary); padding: 4px 12px; border-radius: 20px; font-size: 14px; font-weight: 600;">Level <span id="profile-level"></span></div></div>
                <div style="margin-top: 24px;"><div style="font-size: 12px; font-weight: 600; color: var(--text-secondary);">Experience</div><div class="xp-bar"><div class="xp-bar-fill" id="profile-xp-fill"></div></div><div class="xp-text" id="profile-xp-text"></div></div>
                <p style="font-size:10px; text-align:center; color: #aaa; margin-top:16px;">Biodiversity data provided by <a href="https://inaturalist.org" target="_blank">iNaturalist.org</a></p>
            </div>
            <div class="stats-grid">
                <div class="stat-item"><div class="stat-value" id="stat-total-xp"></div><div class="stat-label">Total XP</div></div>
                <div class="stat-item"><div class="stat-value" id="stat-species"></div><div class="stat-label">Species</div></div>
                <div class="stat-item"><div class="stat-value" id="stat-seeds"></div><div class="stat-label">Seeds</div></div>
                <div class="stat-item"><div class="stat-value" id="stat-badges">0</div><div class="stat-label">Badges</div></div>
                <div class="stat-item"><div class="stat-value" id="stat-sightings"></div><div class="stat-label">Sightings</div></div>
                <div class="stat-item"><div class="stat-value" id="stat-photos">0</div><div class="stat-label">Photos</div></div>
            </div>
        </div>
    </div>
    
    <!-- Field Guide Modal -->
    <div id="fieldGuide" class="modal-container">
         <div class="modal-content">
            <div class="panel-header"><h2>Field Guide</h2><button class="btn-icon" onclick="app.ui.closeAllModals()"><span class="material-symbols-outlined">close</span></button></div>
            <div style="padding: 16px 24px; border-bottom:1px solid var(--border);">
                 <div class="xp-bar" style="height:12px;"><div class="xp-bar-fill" id="fieldguide-progress-fill"></div></div>
                 <div style="font-size:12px; text-align:right; color:var(--text-secondary); margin-top:4px;" id="fieldguide-progress-text"></div>
            </div>
            <div style="padding: 24px; overflow-y:auto; flex:1;" id="fieldguide-body">
                <!-- Content injected by UI.renderFieldGuide -->
            </div>
        </div>
    </div>
    
    <!-- Log Sighting Modal -->
    <div id="logSighting" class="modal-container">
        <div class="modal-content">
            <div class="panel-header"><h2>Log a Sighting</h2><button class="btn-icon" onclick="app.ui.closeAllModals()"><span class="material-symbols-outlined">close</span></button></div>
            <div style="padding: 24px;" id="log-sighting-body">
                <!-- Form or loader is injected here -->
            </div>
        </div>
    </div>
    
    <!-- Rewards Modal (Fully Implemented) -->
    <div id="rewards" class="modal-container">
        <div class="modal-content">
            <div class="panel-header"><h2>Rewards</h2><button class="btn-icon" onclick="app.ui.closeAllModals()"><span class="material-symbols-outlined">close</span></button></div>
            <div style="padding: 24px;">
                <div class="reward-card">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <h3 style="margin:0;">🔥 Daily Streak</h3>
                        <div style="background:var(--bg); padding: 6px 12px; border-radius: 8px; font-weight:600;" id="streak-days-text"></div>
                    </div>
                    <div class="streak-days" id="streak-days-container"></div>
                </div>
                <div class="reward-card">
                    <h3 style="margin:0;">Daily Quest</h3>
                    <p style="color:var(--text-secondary); font-size:14px; margin: 4px 0 16px;" id="quest-description"></p>
                    <div class="xp-bar" style="height:12px;"><div class="xp-bar-fill" id="quest-progress-fill"></div></div>
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:8px;">
                        <div style="font-weight:600; font-size:14px;" id="quest-rewards"></div>
                        <div style="background:var(--bg); padding: 6px 12px; border-radius: 8px; font-weight:600; font-size:12px;" id="quest-status"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Sighting Logged Modal (Fully Implemented) -->
    <div id="sightingLogged" class="modal-container">
        <div class="modal-content" style="text-align: center; padding: 32px; background: linear-gradient(var(--surface) 80%, transparent);">
            <span class="material-symbols-outlined" style="font-size: 48px; color: var(--primary);">check_circle</span>
            <h2>Sighting Logged!</h2>
            <p style="color: var(--primary); font-size: 20px; font-weight: 700;" id="logged-species-name"></p>
            <hr style="border:none; border-top:1px solid var(--border); margin: 24px 0;">
            <p style="font-size: 12px; text-transform:uppercase; letter-spacing:1px; color:var(--text-secondary);">You Earned:</p>
            <div style="display: flex; justify-content: center; gap: 24px; margin: 24px 0;">
                <div><div class="stat-value">⚡ +<span id="logged-xp"></span></div><div class="stat-label">XP</div></div>
                <div><div class="stat-value">🌰 +<span id="logged-seeds"></span></div><div class="stat-label">Seeds</div></div>
            </div>
            <button class="btn-full" onclick="app.ui.closeAllModals()">Continue</button>
        </div>
    </div>


    <script>
        const app = {
            state: {},
            db: null,
            localSpecies: [], // In-memory cache for API results

            async init() {
                this.db = await this.initDB();
                let savedState = await this.db.get('player', 'main');
                if (!savedState) {
                    savedState = this.data.getNewPlayerState();
                    await this.db.put('player', savedState);
                }
                this.state = savedState;

                this.game.checkDailyLogin();
                this.map.init();
                this.ui.renderAll();
            },

            async saveState() { await this.db.put('player', this.state); },

            initDB: () => new Promise((resolve, reject) => {
                const request = indexedDB.open('NatureQuestDB_v3', 1);
                request.onupgradeneeded = e => e.target.result.createObjectStore('player', { keyPath: 'id' });
                request.onsuccess = e => {
                    const db = e.target.result;
                    resolve({
                        get: (store, key) => new Promise(res => db.transaction(store).objectStore(store).get(key).onsuccess = e => res(e.target.result)),
                        put: (store, data) => new Promise(res => db.transaction(store, 'readwrite').objectStore(store).put(data).onsuccess = res)
                    });
                };
                request.onerror = e => reject('DB Error: ' + e.target.errorCode);
            }),

            ui: {
                async openModal(id) {
                    this.closeAllModals();
                    document.getElementById('backdrop').classList.add('open');
                    document.getElementById(id).classList.add('open');

                    if (id === 'fieldGuide') await this.renderFieldGuide();
                    if (id === 'logSighting') await this.renderLogSightingForm();
                },
                closeAllModals() {
                    document.getElementById('backdrop').classList.remove('open');
                    document.querySelectorAll('.modal-container').forEach(m => m.classList.remove('open'));
                },
                renderAll() { this.renderProfile(); this.renderRewards(); },
                renderProfile() {
                    const { username, xp, seeds, speciesData } = app.state;
                    const levelInfo = app.data.getLevelFromXp(xp);
                    const speciesCollected = Object.keys(speciesData).length;
                    const totalSightings = Object.values(speciesData).reduce((sum, d) => sum + d.count, 0);

                    document.getElementById('profile-username').innerText = username;
                    document.getElementById('profile-level').innerText = levelInfo.level;
                    document.getElementById('profile-xp-fill').style.width = `${levelInfo.progressPercent}%`;
                    document.getElementById('profile-xp-text').innerText = `${levelInfo.levelXp} / ${levelInfo.xpForNext} XP`;
                    document.getElementById('stat-total-xp').innerText = xp;
                    document.getElementById('stat-species').innerText = `${speciesCollected}/${app.localSpecies.length || '...'}`;
                    document.getElementById('stat-seeds').innerText = seeds;
                    document.getElementById('stat-sightings').innerText = totalSightings;
                },
                renderRewards() {
                    const { streak, quests } = app.state;
                    document.getElementById('streak-days-text').innerText = `${streak} Day${streak === 1 ? '' : 's'}`;
                    const daysContainer = document.getElementById('streak-days-container');
                    daysContainer.innerHTML = Array(7).fill(0).map((_, i) => `<div class="day-circle ${i < streak % 7 ? 'active' : ''}"><span>✔</span>${['S','M','T','W','T','F','S'][(new Date().getDay() - 6 + i + 7)%7]}</div>`).join('');
                    
                    const quest = quests.daily;
                    document.getElementById('quest-description').innerText = quest.description;
                    document.getElementById('quest-rewards').innerHTML = `<span>⚡ ${quest.rewards.xp} XP</span> <span style="margin-left:8px;">🌰 ${quest.rewards.seeds} Seeds</span>`;
                    const progress = Math.min(quest.progress / quest.target, 1);
                    document.getElementById('quest-progress-fill').style.width = `${progress * 100}%`;
                    document.getElementById('quest-status').innerText = progress >= 1 ? "COMPLETED" : "IN PROGRESS";
                },

                async renderFieldGuide() {
                    const body = document.getElementById('fieldguide-body');
                    body.innerHTML = '<div class="loader" style="margin: 40px auto;"></div><p style="text-align:center; color:var(--text-secondary);">Fetching local species...</p>';

                    await app.data.ensureLocalSpecies();
                    
                    body.innerHTML = '<div class="fieldguide-grid" id="fieldguide-grid-container"></div>'; // Replace loader
                    const grid = document.getElementById('fieldguide-grid-container');

                    const collectedCount = Object.keys(app.state.speciesData).length;
                    document.getElementById('fieldguide-progress-fill').style.width = `${(collectedCount / app.localSpecies.length) * 100}%`;
                    document.getElementById('fieldguide-progress-text').innerText = `${collectedCount} / ${app.localSpecies.length} Discovered Locally`;

                    app.localSpecies.forEach(s => {
                        const playerData = app.state.speciesData[s.id];
                        const card = document.createElement('div');
                        card.className = `species-card ${!playerData ? 'locked' : ''}`;
                        card.innerHTML = `<div class="species-card-img" style="background-image: url('${s.img}');"><div class="rarity-tag">${s.rarity}</div></div><div class="species-card-info"><h4 style="margin:0 0 4px;">${playerData ? s.name : '???'}</h4><div style="font-size:12px; color:var(--text-secondary);">${playerData ? `LV.${playerData.level} • Sighted ${playerData.count}x` : 'Undiscovered'}</div></div>`;
                        grid.appendChild(card);
                    });
                },
                
                async renderLogSightingForm() {
                    const body = document.getElementById('log-sighting-body');
                    body.innerHTML = '<div class="loader" style="margin: 40px auto;"></div><p style="text-align:center; color:var(--text-secondary);">Finding nearby species...</p>';
                    
                    await app.data.ensureLocalSpecies();
                    
                    body.innerHTML = `
                        <form id="log-sighting-form" style="display: flex; flex-direction: column; gap: 16px;">
                            <div><label class="stat-label" style="margin-bottom:4px;">Location</label><input id="sighting-location" class="form-input" type="text" value="${app.map.currentLocationName || ''}"></div>
                            <div><label class="stat-label" style="margin-bottom:4px;">Species</label><div id="species-entry-list" style="display: flex; flex-direction: column; gap: 8px;"></div><button type="button" onclick="app.game.addSpeciesToLogForm()" style="margin-top:8px; border:1px dashed var(--border); background:var(--bg); padding:10px; border-radius:8px; cursor:pointer; width:100%;">+ Add Species</button></div>
                            <div><label class="stat-label" style="margin-bottom:4px;">Field Notes</label><textarea id="sighting-notes" class="form-textarea" rows="3"></textarea></div>
                            <button type="submit" class="btn-full" style="margin-top:16px;">Save Sighting</button>
                        </form>`;
                    
                    app.game.addSpeciesToLogForm(); // Add the first entry
                    
                    document.getElementById('log-sighting-form').addEventListener('submit', (e) => {
                        e.preventDefault();
                        const entries = [];
                        document.querySelectorAll('.species-entry').forEach(entry => {
                            const speciesId = entry.querySelector('select').value;
                            const count = parseInt(entry.querySelector('input[type="number"]').value, 10);
                            if (speciesId && count > 0) entries.push({ speciesId, count });
                        });
                        if (entries.length > 0) {
                            app.game.logSighting(entries);
                            this.closeAllModals();
                        }
                    });
                },
                
                showSightingLoggedModal(xp, seeds, speciesName) {
                    document.getElementById('logged-xp').innerText = xp;
                    document.getElementById('logged-seeds').innerText = seeds;
                    document.getElementById('logged-species-name').innerText = speciesName;
                    this.openModal('sightingLogged');
                    confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
                }
            },

            game: {
                logSighting(entries) {
                    let totalXpGained = 0, totalSeedsGained = 0;
                    entries.forEach(({ speciesId, count }) => {
                        const species = app.data.getSpeciesById(speciesId);
                        if (!species) return;
                        totalXpGained += species.xp * count;
                        totalSeedsGained += species.seeds * count;
                        if (!app.state.speciesData[speciesId]) app.state.speciesData[speciesId] = { level: 1, xp: 0, count: 0 };
                        app.state.speciesData[speciesId].count += count;
                    });
                    app.state.xp += totalXpGained;
                    app.state.seeds += totalSeedsGained;
                    app.saveState();
                    app.ui.renderAll();
                    const firstName = entries.length > 0 ? app.data.getSpeciesById(entries[0].speciesId).name : "Multiple";
                    app.ui.showSightingLoggedModal(totalXpGained, totalSeedsGained, firstName);
                },
                checkDailyLogin() { /* Unchanged */ },
                addSpeciesToLogForm() {
                    const list = document.getElementById('species-entry-list');
                    if (!list) return;
                    const entry = document.createElement('div');
                    entry.className = 'species-entry';
                    const select = document.createElement('select');
                    select.className = 'form-select';
                    const categories = [...new Set(app.localSpecies.map(s => s.category))];
                    categories.forEach(cat => {
                        const optgroup = document.createElement('optgroup');
                        optgroup.label = cat;
                        app.localSpecies.filter(s => s.category === cat).forEach(s => {
                            const option = document.createElement('option');
                            option.value = s.id;
                            option.innerText = s.name;
                            optgroup.appendChild(option);
                        });
                        select.appendChild(optgroup);
                    });
                    entry.innerHTML = `<input class="form-input" type="number" value="1" min="1"><span style="font-weight:600; font-size:18px;">×</span>`;
                    entry.appendChild(select);
                    entry.insertAdjacentHTML('beforeend', `<button type="button" class="btn-icon" onclick="this.parentElement.remove()"><span class="material-symbols-outlined">delete</span></button>`);
                    list.appendChild(entry);
                }
            },

            data: {
                async ensureLocalSpecies() {
                    if (app.localSpecies.length > 0) return;
                    const { lat, lng } = app.map.currentLatLng;
                    if (!lat) {
                        await new Promise(resolve => setTimeout(resolve, 2000)); // Wait for GPS
                        if (!app.map.currentLatLng.lat) {
                            alert("Could not get GPS signal. Using default location.");
                            app.map.currentLatLng = { lat: 40.71, lng: -74.00 }; // Default to NYC
                        }
                    }

                    const cacheKey = `species_${lat.toFixed(2)}_${lng.toFixed(2)}_${new Date().getMonth()}`;
                    const cached = sessionStorage.getItem(cacheKey);
                    if (cached) {
                        app.localSpecies = JSON.parse(cached);
                        return;
                    }

                    const iconicTaxa = 'Plantae,Aves,Mammalia,Insecta,Amphibia,Reptilia';
                    const month = new Date().getMonth() + 1;
                    const url = `https://api.inaturalist.org/v1/observations/species_counts?lat=${lat}&lng=${lng}&radius=50&month=${month}&iconic_taxa=${iconicTaxa}&verifiable=true&hrank=species`;
                    
                    try {
                        const response = await fetch(url);
                        if (!response.ok) throw new Error('iNaturalist API error');
                        const data = await response.json();
                        
                        app.localSpecies = data.results.slice(0, 100).map(item => { // Cap at 100 for performance
                            const count = item.count;
                            const xp = Math.max(10, Math.round(5 + 2000 / (count + 10)));
                            const seeds = Math.max(1, Math.round(1 + 200 / (count + 10)));
                            let rarity = 'Common';
                            if (xp > 50) rarity = 'Uncommon';
                            if (xp > 100) rarity = 'Rare';
                            
                            return { id: item.taxon.id, name: item.taxon.preferred_common_name || item.taxon.name, img: item.taxon.default_photo?.medium_url, category: item.taxon.iconic_taxon_name, xp, seeds, rarity };
                        }).filter(s => s.name && s.img);

                        sessionStorage.setItem(cacheKey, JSON.stringify(app.localSpecies));
                    } catch (error) {
                        console.error('Failed to fetch iNaturalist data:', error);
                        alert('Could not fetch local species data. Please check your connection.');
                    }
                },
                getSpeciesById(id) { return app.localSpecies.find(s => s.id == id); },
                getLevelFromXp(xp) { /* Unchanged */ },
                getNewDailyQuest() { /* Unchanged */ },
                getNewPlayerState: () => ({ id: 'main', username: `Explorer${Math.floor(1000 + Math.random() * 9000)}`, xp: 0, seeds: 0, lastLogin: null, streak: 0, quests: { daily: { description: 'Log a new species.', progress: 0, target: 1, rewards: {xp: 100, seeds: 20} }}, speciesData: {} })
            },
            
            map: {
                instance: null, currentLocationName: '', currentLatLng: {},
                init() {
                    this.instance = L.map('map', { zoomControl: false, attributionControl: false }).setView([40.71, -74.00], 13); // Default
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png').addTo(this.instance);
                    this.instance.on('locationfound', e => {
                        this.currentLocationName = "Your Current Location";
                        this.currentLatLng = { lat: e.latlng.lat, lng: e.latlng.lng };
                    });
                    this.instance.locate({ setView: true, maxZoom: 16, watch: true, enableHighAccuracy: true });
                }
            }
        };

        window.onload = () => app.init();
    </script>
</body>
</html>
