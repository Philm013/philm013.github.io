<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#ffffff">
  <title>Gemma 4 Ultimate</title>
  
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mammoth@1.8.0/mammoth.browser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.min.mjs" type="module"></script>
  <script>window.MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] } };</script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  
  <style>
    :root {
      --ollama-black: #000000; --ollama-near-black: #262626; --ollama-white: #ffffff;
      --ollama-snow: #fafafa; --ollama-light-gray: #e5e5e5; --ollama-stone: #737373;
      --ollama-mid-gray: #525252; --ollama-border: #e5e5e5;
      --radius-container: 12px; --radius-pill: 9999px;
      --header-height: 64px; --nav-height: 72px; --sidebar-width: 260px;
      --font-display: 'Inter', system-ui, sans-serif;
      --font-body: ui-sans-serif, system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background-color: var(--ollama-white); color: var(--ollama-near-black);
      font-family: var(--font-body); height: 100dvh; display: flex; flex-direction: row;
      overflow: hidden; line-height: 1.5; position: fixed; width: 100%;
    }

    /* Sidebar (Desktop) */
    #desktop-sidebar {
      width: var(--sidebar-width); background: var(--ollama-snow); border-right: 1px solid var(--ollama-border);
      display: flex; flex-direction: column; flex-shrink: 0; z-index: 150;
    }
    .sidebar-header { padding: 24px; display: flex; align-items: center; gap: 12px; font-family: var(--font-display); font-weight: 500; font-size: 1.1rem; }
    .sidebar-content { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 4px; }
    .sidebar-item { padding: 10px 16px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; border: none; background: none; text-align: left; display: flex; align-items: center; gap: 10px; width: 100%; transition: background 0.2s; font-family: inherit; }
    .sidebar-item:hover { background: var(--ollama-light-gray); }
    .sidebar-item.active { background: var(--ollama-white); border: 1px solid var(--ollama-border); font-weight: 500; }
    .sidebar-section-title { font-size: 0.7rem; font-weight: 600; color: var(--ollama-stone); text-transform: uppercase; margin: 16px 12px 4px; letter-spacing: 0.05em; }

    /* Main Area */
    .main-screen { flex: 1; display: flex; flex-direction: column; background: var(--ollama-white); height: 100%; min-width: 0; position: relative; }
    header { height: var(--header-height); padding: 0 24px; border-bottom: 1px solid var(--ollama-border); display: flex; justify-content: space-between; align-items: center; z-index: 100; flex-shrink: 0; background: #fff; }
    .header-title { font-family: var(--font-display); font-weight: 500; font-size: 1.1rem; }
    .status-badge { padding: 4px 12px; border-radius: var(--radius-pill); font-size: 0.75rem; background: var(--ollama-snow); border: 1px solid var(--ollama-border); color: var(--ollama-stone); display: flex; align-items: center; gap: 6px; }
    .status-badge.online { color: var(--ollama-black); border-color: var(--ollama-black); }

    #chat-container { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 32px; scroll-behavior: smooth; max-width: 800px; margin: 0 auto; width: 100%; }
    .message { width: 100%; animation: fadeIn 0.2s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }
    .message.user { display: flex; flex-direction: column; align-items: flex-end; }
    .user-bubble { background: var(--ollama-snow); padding: 12px 20px; border-radius: 20px; border: 1px solid var(--ollama-border); max-width: 85%; font-weight: 500; font-size: 16px; }
    
    /* Thinking Box */
    .thought-container { margin-bottom: 12px; border-radius: 12px; background: var(--ollama-snow); border: 1px solid var(--ollama-border); width: fit-content; max-width: 100%; overflow: hidden; }
    .thought-header { padding: 8px 16px; font-size: 0.75rem; color: var(--ollama-stone); cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .thought-content { display: none; padding: 0 16px 12px; font-size: 0.85rem; color: var(--ollama-mid-gray); white-space: pre-wrap; font-style: italic; border-top: 1px solid var(--ollama-border); padding-top: 8px; }
    .thought-container.open .thought-content { display: block; }
    .pulse { animation: thought-pulse 1.5s infinite; }
    @keyframes thought-pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

    /* Bottom Bar */
    .bottom-stack { background: #fff; border-top: 1px solid var(--ollama-border); padding-bottom: env(safe-area-inset-bottom); z-index: 100; flex-shrink: 0; }
    .bottom-inner { max-width: 800px; margin: 0 auto; width: 100%; }
    .active-context { display: flex; gap: 8px; padding: 8px 24px; overflow-x: auto; background: var(--ollama-snow); border-bottom: 1px solid var(--ollama-border); }
    .context-chip { background: #fff; padding: 4px 12px; border-radius: var(--radius-pill); font-size: 0.7rem; display: flex; align-items: center; gap: 6px; border: 1px solid var(--ollama-border); white-space: nowrap; }
    
    .input-row { display: flex; padding: 12px 24px; position: relative; gap: 8px; }
    .input-container { 
      display: flex; flex: 1; align-items: flex-end; background: #fff; border: 1px solid var(--ollama-border); 
      border-radius: 24px; padding: 4px 8px 4px 16px; gap: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); 
    }
    .input-container:focus-within { border-color: #000; }
    
    textarea { 
      flex: 1; background: none; border: none; padding: 8px 0; color: #000; 
      font-family: var(--font-body); font-size: 16px; resize: none; max-height: 120px; outline: none; min-height: 24px;
    }
    .icon-btn { width: 36px; height: 36px; border-radius: var(--radius-pill); background: none; border: none; color: #737373; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; font-size: 1.1rem; touch-action: manipulation; }
    .icon-btn:hover:not(:disabled) { color: #000; background: var(--ollama-snow); }
    .icon-btn.primary { color: #fff; background: #000; }

    /* Slash Menu */
    .slash-menu { 
      position: absolute; bottom: 100%; left: 24px; right: 24px; background: #fff; border: 1px solid var(--ollama-border); 
      border-radius: 8px; display: none; flex-direction: column; z-index: 1000; box-shadow: 0 8px 24px rgba(0,0,0,0.1); margin-bottom: 8px; overflow: hidden;
    }
    .slash-item { padding: 12px 20px; cursor: pointer; display: flex; justify-content: space-between; border-bottom: 1px solid var(--ollama-border); font-size: 0.9rem; }
    .slash-item:hover { background: var(--ollama-snow); }

    /* Mobile Nav */
    nav#mobile-nav { display: none; }

    /* Overlay Panels */
    .overlay-panel { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
    .overlay-panel.open { display: flex; }
    .panel-window { background: #fff; width: 100%; max-width: 600px; max-height: 80vh; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 12px 40px rgba(0,0,0,0.15); border: 1px solid var(--ollama-border); }
    .panel-header { padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--ollama-border); background: var(--ollama-snow); }
    .panel-content { flex: 1; overflow-y: auto; padding: 24px; }
    .btn-block { width: 100%; padding: 12px 20px; border-radius: 20px; border: 1px solid var(--ollama-border); font-family: var(--font-display); font-weight: 500; cursor: pointer; text-align: center; background: #fff; font-size: 0.9rem; margin-bottom: 8px; }
    .btn-primary { background: #000; color: #fff; border: none; }

    .hidden { display: none; }

    @media (max-width: 768px) {
      body { flex-direction: column; } #desktop-sidebar { display: none; }
      nav#mobile-nav { display: flex; height: var(--nav-height); background: #fff; border-top: 1px solid var(--ollama-border); justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom); }
      .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #737373; background: none; border: none; flex: 1; font-size: 0.65rem; font-weight: 500; cursor: pointer; padding: 8px 0; }
      .nav-item.active { color: #000; } .nav-icon { font-size: 1.3rem; }
      .overlay-panel { padding: 0; align-items: flex-end; } .panel-window { max-height: 85vh; border-radius: 16px 16px 0 0; }
      #chat-container { padding: 16px; } .input-row { padding: 12px 16px; }
    }
  </style>
</head>
<body>

  <!-- Sidebar (Desktop) -->
  <aside id="desktop-sidebar">
    <div class="sidebar-header">Gemma 4</div>
    <div class="sidebar-content">
      <button class="sidebar-item active" onclick="showPanel('chat')">💬 Chat</button>
      <button class="sidebar-item" onclick="showPanel('library')">📚 Library</button>
      <button class="sidebar-item" onclick="showPanel('memory')">🧠 Memory</button>
      <button class="sidebar-item" onclick="showPanel('batch')">📋 Batch</button>
      <button class="sidebar-item" onclick="showPanel('history')">🕒 History</button>
      <button class="sidebar-item" onclick="showPanel('settings')">⚙️ Settings</button>
      <div class="sidebar-section-title">Context</div>
      <div id="sidebar-context-list"></div>
    </div>
  </aside>

  <!-- Main View -->
  <div class="main-screen">
    <header>
      <div class="header-title">Native Assistant</div>
      <div id="status-badge" class="status-badge"><span id="status-text">Disconnected</span></div>
    </header>

    <main id="chat-container">
      <div class="message ai"><div class="msg-body"><p>Local AI active. Waking up engine...</p></div></div>
    </main>

    <footer class="bottom-stack">
      <div id="active-context" class="active-context hidden"></div>
      <div class="input-row">
        <div id="slash-menu" class="slash-menu"></div>
        <div class="input-container">
          <button class="icon-btn" id="attach-trigger" title="Library">📎</button>
          <textarea id="chat-input" rows="1" placeholder="Initializing..." disabled></textarea>
          <button id="send-btn" class="icon-btn primary" onclick="handleSend()" disabled title="Send">➤</button>
        </div>
      </div>
      
      <nav id="mobile-nav">
        <button class="nav-item active" onclick="showPanel('chat')"><span class="nav-icon">💬</span>Chat</button>
        <button class="nav-item" onclick="showPanel('library')"><span class="nav-icon">📚</span>Lib</button>
        <button class="nav-item" onclick="showPanel('memory')"><span class="nav-icon">🧠</span>Mem</button>
        <button class="nav-item" onclick="showPanel('history')"><span class="nav-icon">🕒</span>Hist</button>
        <button class="nav-item" onclick="showPanel('settings')"><span class="nav-icon">⚙️</span>Set</button>
      </nav>
    </footer>
  </div>

  <!-- Panels -->
  <div id="library-panel" class="overlay-panel"><div class="panel-window"><div class="panel-header"><strong>Library</strong><button onclick="hidePanels()" class="icon-btn">✕</button></div><div class="panel-content"><div id="library-list"></div><button class="btn-block btn-primary" onclick="document.getElementById('global-file-input').click()">Upload Files</button></div></div></div>
  <div id="memory-panel" class="overlay-panel"><div class="panel-window"><div class="panel-header"><strong>Local Memory (RAG)</strong><button onclick="hidePanels()" class="icon-btn">✕</button></div><div class="panel-content"><div id="memory-list" style="margin-bottom:16px;"></div><button class="btn-block" onclick="auditMemories()">Audit for Duplicates</button></div></div></div>
  <div id="batch-panel" class="overlay-panel"><div class="panel-window"><div class="panel-header"><strong>Batch Runner</strong><button onclick="hidePanels()" class="icon-btn">✕</button></div><div class="panel-content"><textarea id="batch-input" style="width:100%;height:150px;border:1px solid #eee;border-radius:8px;padding:12px;margin-bottom:12px;font-size:16px;" placeholder="Task 1...&#10;Task 2 with {{previous}}..."></textarea><button class="btn-block btn-primary" onclick="runBatch()">Run Sequentially Tasks</button></div></div></div>
  <div id="history-panel" class="overlay-panel"><div class="panel-window"><div class="panel-header"><strong>History</strong><button onclick="hidePanels()" class="icon-btn">✕</button></div><div class="panel-content" id="history-list"></div></div></div>
  <div id="settings-panel" class="overlay-panel"><div class="panel-window"><div class="panel-header"><strong>Settings</strong><button onclick="hidePanels()" class="icon-btn">✕</button></div><div class="panel-content"><div style="display:flex;flex-direction:column;gap:16px;"><div><label style="font-size:0.7rem;font-weight:600;color:var(--ollama-stone);">SYSTEM PROMPT</label><textarea id="system-prompt" style="width:100%;height:100px;border:1px solid var(--ollama-border);border-radius:8px;padding:12px;margin-top:4px;outline:none;font-size:16px;">You are a helpful assistant. Answer concisely.</textarea></div><button class="btn-block" onclick="purgeCache()">Purge Cache</button><button class="btn-block btn-primary" onclick="exportData()">Full Backup</button></div></div></div></div>

  <input type="file" id="global-file-input" class="hidden" multiple accept="*/*">

  <script type="module">
    import { LlmInference, FilesetResolver } from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-genai';
    import * as pdfjsLib from 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.min.mjs';
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.worker.min.mjs';

    const REMOTE_MODEL = 'https://huggingface.co/litert-community/gemma-4-E2B-it-litert-lm/resolve/main/gemma-4-E2B-it-web.task';
    const LOCAL_MODEL = './gemma-4-E2B-it-web.task';
    const State = { inference: null, history: [], conversationId: Date.now().toString(36), isGenerating: false, embeddingReady: false, embeddingWorker: null, library: [], activeContext: new Set(), activeModel: REMOTE_MODEL };

    // --- DB Setup ---
    const DB = {
      name: 'GemmaUltimate_DB_v7',
      async open() { return new Promise(res => { const req = indexedDB.open(this.name, 1); req.onupgradeneeded = e => { const db = e.target.result; db.createObjectStore('files', { keyPath: 'id' }); db.createObjectStore('chats', { keyPath: 'id' }); db.createObjectStore('vectors', { keyPath: 'id' }); }; req.onsuccess = () => res(req.result); }); },
      async save(s, d) { const db = await this.open(); const tx = db.transaction(s, 'readwrite'); tx.objectStore(s).put(d); return new Promise(r => tx.oncomplete = r); },
      async getAll(s) { const db = await this.open(); const tx = db.transaction(s, 'readonly'); const req = tx.objectStore(s).getAll(); return new Promise(r => req.onsuccess = () => r(req.result)); },
      async delete(s, id) { const db = await this.open(); const tx = db.transaction(s, 'readwrite'); tx.objectStore(s).delete(id); return new Promise(r => tx.oncomplete = r); }
    };

    // --- Core Inference ---
    const updateStatus = (t, x) => { const b = document.getElementById('status-badge'), e = document.getElementById('status-text'); b.className = `status-badge ${t}`; e.textContent = x; };

    async function initGemma() {
      try {
        updateStatus('loading', 'Checking local weights...');
        let modelPath = REMOTE_MODEL;
        try {
          const check = await fetch(LOCAL_MODEL, { method: 'HEAD' });
          if (check.ok) {
            modelPath = LOCAL_MODEL;
            console.log('Using local model weights.');
          } else {
            console.log('Local model not found, using Hugging Face.');
          }
        } catch (e) {
          console.log('Local check failed, falling back to Hugging Face.');
        }
        State.activeModel = modelPath;

        updateStatus('loading', 'Linking...');
        const f = await FilesetResolver.forGenAiTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-genai/wasm");
        updateStatus('loading', 'Booting weights...');
        State.inference = await LlmInference.createFromOptions(f, {
          baseOptions: { modelAssetPath: State.activeModel, delegate: navigator.gpu ? "GPU" : "CPU" },
          maxTokens: 2048, temperature: 0.7
        });        updateStatus('online', 'Ready');
        document.getElementById('chat-input').disabled = false;
        document.getElementById('send-btn').disabled = false;
      } catch (e) { updateStatus('error', 'Brain Failure'); console.error(e); }
    }

    // --- Local Vector RAG (Transformers.js) ---
    async function initEmbedding() {
      const code = `
        import { pipeline } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0-alpha.19/+esm';
        let embedder = null;
        self.onmessage = async (e) => {
          if (e.data.type === 'load') { embedder = await pipeline('feature-extraction', 'Xenova/all-MiniLM-L6-v2'); self.postMessage({ type: 'ready' }); }
          else if (e.data.type === 'embed') { const out = await embedder(e.data.text, { pooling: 'mean', normalize: true }); self.postMessage({ type: 'result', vec: Array.from(out.data), id: e.data.id }); }
        };
      `;
      const blob = new Blob([code], { type: 'application/javascript' });
      State.embeddingWorker = new Worker(URL.createObjectURL(blob), { type: 'module' });
      State.embeddingWorker.onmessage = e => { if (e.data.type === 'ready') State.embeddingReady = true; };
      State.embeddingWorker.postMessage({ type: 'load' });
    }

    function embed(text) {
      return new Promise(res => {
        const id = Math.random().toString(36);
        const h = e => { if (e.data.id === id) { State.embeddingWorker.removeEventListener('message', h); res(e.data.vec); } };
        State.embeddingWorker.addEventListener('message', h);
        State.embeddingWorker.postMessage({ type: 'embed', text, id });
      });
    }

    function cosineSim(a, b) { let d=0, nA=0, nB=0; for(let i=0; i<a.length; i++){ d+=a[i]*b[i]; nA+=a[i]**2; nB+=b[i]**2; } return d / (Math.sqrt(nA) * Math.sqrt(nB)); }

    // --- Agent Tools ---
    const TOOL_REGISTRY = {
      calculate: { description: 'Math solver', parameters: { type: 'object', properties: { expression: { type: 'string' } } }, async execute(a) { return { result: eval(a.expression.replace(/[^0-9+\-*/.()% ]/g,'')) }; } },
      get_current_time: { description: 'Current time', parameters: { type: 'object', properties: {} }, async execute() { return { datetime: new Date().toLocaleString() }; } },
      store_memory: { description: 'Remember fact', parameters: { type: 'object', properties: { content: { type: 'string' } } }, async execute(a) { const id = Date.now().toString(36); const vec = State.embeddingReady ? await embed(a.content) : null; await DB.save('vectors', { id, content: a.content, vec, date: Date.now() }); return { stored: true }; } },
      search_memory: { description: 'Recall knowledge', parameters: { type: 'object', properties: { query: { type: 'string' } } }, async execute(a) { if (!State.embeddingReady) return { error: "Waiting for engine..." }; const qV = await embed(a.query); const all = await DB.getAll('vectors'); const sc = all.map(m => ({ ...m, score: cosineSim(qV, m.vec) })).filter(m => m.score > 0.5).sort((a,b) => b.score - a.score).slice(0, 3); return { memories: sc.map(r => r.content) }; } },
      fetch_page: { description: 'Read URL', parameters: { type: 'object', properties: { url: { type: 'string' } } }, async execute(a) { try { const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(a.url)}`); const d = await r.json(); return { content: d.contents.slice(0, 2000) }; } catch(e) { return { error: e.message }; } } }
    };

    window.handleSend = async (ov = null) => {
      const i = document.getElementById('chat-input'), t = ov || i.value.trim();
      if (!t || State.isGenerating) return;
      if (!ov) { i.value = ''; renderMessage(t, 'user'); State.history.push({ role: 'user', text: t }); }
      State.isGenerating = true; const aiEl = renderMessage('', 'ai'); let full = "";
      try {
        await new Promise(res => { State.inference.generateResponse(buildPrompt(), (chunk, done) => { full += chunk; renderMessage(full, 'ai', aiEl); if (done) res(); }); });
        const tc = full.match(/<tool_call>\s*([\s\S]*?)\s*<\/tool_call>/);
        if (tc) {
          try {
            const call = JSON.parse(tc[1]); const tool = TOOL_REGISTRY[call.name];
            if (tool) {
              const res = await tool.execute(call.arguments);
              State.history.push({ role: 'ai', text: full });
              State.history.push({ role: 'user', text: `<tool_response>${JSON.stringify(res)}</tool_response>` });
              State.isGenerating = false; return handleSend(true);
            }
          } catch(e) {}
        }
        State.history.push({ role: 'ai', text: full });
      } catch (e) { renderMessage('Error: ' + e.message, 'ai', aiEl); } finally { State.isGenerating = false; saveChat(); }
    };

    function buildPrompt() {
      const s = document.getElementById('system-prompt').value;
      const toolDefs = Object.entries(TOOL_REGISTRY).map(([n,t]) => ({ name: n, desc: t.description, params: t.parameters }));
      let p = `<|turn|>system\n${s}\n\nTools:\n${JSON.stringify(toolDefs)}\nFormat calls: <tool_call>{"name":"...","arguments":{}}</tool_call>\n<turn|>\n`;
      State.history.slice(-10).forEach(m => { p += `<|turn|>${m.role === 'ai' ? 'model' : 'user'}\n${m.text}<turn|>\n`; });
      p += `<|turn|>model\n`; return p;
    }

    // --- UI Logic ---
    function renderMessage(t, r, el = null) {
      const c = document.getElementById('chat-container');
      if (!el) { el = document.createElement('div'); el.className = `message ${r}`; c.appendChild(el); }
      if (r === 'user') { el.innerHTML = `<div class="user-bubble">${DOMPurify.sanitize(t)}</div>`; }
      else {
        const p = parseThought(t);
        el.innerHTML = (p.thought ? `<div class="thought-container"><div class="thought-header">Thought</div><div class="thought-content">${p.thought}</div></div>` : '') + 
                       DOMPurify.sanitize(marked.parse(p.content || (p.thinking ? '...' : '')));
        const tB = el.querySelector('.thought-container'); if (tB) tB.onclick = () => tB.classList.toggle('open');
      }
      c.scrollTop = c.scrollHeight; return el;
    }

    function parseThought(t) {
      const s = '<|channel|>thought', e = '<channel|>', si = t.indexOf(s);
      if (si === -1) return { thought: null, content: t };
      const ci = si + s.length, ei = t.indexOf(e, ci);
      if (ei === -1) return { thought: t.substring(ci), content: "", thinking: true };
      return { thought: t.substring(ci, ei), content: t.substring(ei + e.length), thinking: false };
    }

    // --- Slash Commands UI ---
    function handleSlash(val) {
      const menu = document.getElementById('slash-menu');
      if (val.startsWith('/')) {
        const q = val.slice(1).toLowerCase();
        const items = Object.keys(TOOL_REGISTRY).concat(['clear', 'library', 'memory', 'batch', 'settings']).filter(t => t.startsWith(q));
        if (items.length) {
          menu.innerHTML = items.map(t => `<div class="slash-item" onclick="applySlash('${t}')"><span>/${t}</span></div>`).join('');
          menu.style.display = 'flex';
        } else menu.style.display = 'none';
      } else menu.style.display = 'none';
    }
    window.applySlash = t => {
      const i = document.getElementById('chat-input');
      if (t === 'clear') { State.history = []; document.getElementById('chat-container').innerHTML = ''; }
      else if (['library', 'memory', 'batch', 'settings'].includes(t)) showPanel(t);
      else i.value = `/${t} `;
      document.getElementById('slash-menu').style.display = 'none'; i.focus();
    };

    window.showPanel = n => { hidePanels(); if (n === 'chat') return; document.getElementById(`${n}-panel`).classList.add('open'); if (n === 'memory') refreshMemoryUI(); if (n === 'library') refreshLibraryUI(); if (n === 'history') refreshHistoryUI(); };
    window.hidePanels = () => document.querySelectorAll('.overlay-panel').forEach(p => p.classList.remove('open'));

    // --- Data Persistence ---
    async function saveChat() { const title = State.history[0]?.text.slice(0, 30) || "Chat"; await DB.save('chats', { id: State.conversationId, title, history: State.history, date: Date.now() }); }
    async function refreshHistoryUI() {
      const all = await DB.getAll('chats'); const list = document.getElementById('history-list'); list.innerHTML = '';
      all.sort((a,b)=>b.date-a.date).forEach(c => {
        const it = document.createElement('button'); it.className = 'sidebar-item'; it.innerHTML = `<div>${c.title}</div><div style="font-size:0.7rem; opacity:0.5;">${new Date(c.date).toLocaleDateString()}</div>`;
        it.onclick = () => { State.conversationId = c.id; State.history = c.history; document.getElementById('chat-container').innerHTML = ''; State.history.forEach(m => renderMessage(m.text, m.role)); hidePanels(); };
        list.appendChild(it);
      });
    }

    async function refreshMemoryUI() {
      const all = await DB.getAll('vectors'); const list = document.getElementById('memory-list'); list.innerHTML = '';
      all.forEach(m => {
        const it = document.createElement('div'); it.style = "padding:10px; border-bottom:1px solid #eee; font-size:0.8rem; display:flex; justify-content:space-between;";
        it.innerHTML = `<div style="flex:1;">${m.content}</div><span onclick="deleteMemory('${m.id}')" style="cursor:pointer; opacity:0.5;">✕</span>`;
        list.appendChild(it);
      });
    }
    window.deleteMemory = async id => { if (confirm('Delete?')) { await DB.delete('vectors', id); refreshMemoryUI(); } };

    // --- Event Setup ---
    document.getElementById('chat-input').oninput = e => { handleSlash(e.target.value); e.target.style.height = 'auto'; e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px'; };
    document.getElementById('chat-input').onkeydown = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } };

    window.onload = () => { initGemma(); initEmbedding(); };
  </script>
</body>
</html>
