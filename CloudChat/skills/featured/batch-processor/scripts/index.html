<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Batch Processor</title>
</head>
<body>
  <script>
    /**
     * Substitute {{previous}} placeholder in a prompt template.
     * @param {string} template
     * @param {string} previous
     * @returns {string}
     */
    function substituteTemplate(template, previous) {
      return template.replace(/\{\{previous\}\}/g, previous);
    }

    window['ai_edge_gallery_get_result'] = async (data) => {
      try {
        const jsonData = JSON.parse(data);
        const prompts = Array.isArray(jsonData.prompts) ? jsonData.prompts : [];
        const initialContext = String(jsonData.context || '');

        if (!prompts.length) {
          return JSON.stringify({ error: 'No prompts provided. Pass an array of prompts.' });
        }

        const steps = [];
        let previous = initialContext;

        for (let i = 0; i < prompts.length; i++) {
          const raw = String(prompts[i] || '').trim();
          if (!raw) {
            steps.push({ step: i + 1, prompt: raw, result: '', skipped: true });
            continue;
          }

          // Substitute {{previous}} placeholder
          const resolved = substituteTemplate(raw, previous);

          steps.push({
            step: i + 1,
            prompt: resolved,
            placeholder_used: raw.includes('{{previous}}'),
            ready_for_llm: true
          });

          // Note: In the AI Edge Gallery context, the LLM will process each step prompt.
          // Here we record the resolved prompt for the LLM to execute sequentially.
          // The `previous` value for the next step will be whatever the LLM responds with.
          previous = resolved; // Will be updated by the calling app with actual LLM output
        }

        return JSON.stringify({
          result: 'Batch pipeline ready. Execute each step prompt in order.',
          steps,
          totalSteps: steps.length,
          instruction: 'Process each step.prompt sequentially. After each step, the LLM response becomes the input for the next {{previous}} placeholder.'
        });
      } catch (e) {
        return JSON.stringify({ error: 'Batch processor failed: ' + e.message });
      }
    };
  </script>

  <!-- Local test UI -->
  <div style="margin:20px;padding:20px;border:1px solid #ccc;font-family:sans-serif">
    <h3>Batch Processor — Test</h3>
    <p style="font-size:13px;color:#555">Enter one prompt per line. Use <code>{{previous}}</code> to reference the prior step's output.</p>
    <textarea id="prompts" rows="6" placeholder="Write a haiku about autumn&#10;Translate this to French: {{previous}}&#10;Summarize in one word: {{previous}}"
      style="width:500px;padding:8px;font-size:13px"></textarea>
    <br>
    <input id="context" type="text" placeholder="Optional: initial context for {{previous}}"
      style="width:500px;padding:8px;font-size:13px;margin-top:8px">
    <br>
    <button id="run" style="padding:8px 16px;margin-top:8px;cursor:pointer">Process</button>
    <pre id="out" style="margin-top:12px;padding:10px;background:#f4f4f4;font-size:13px;white-space:pre-wrap;max-height:400px;overflow:auto"></pre>
  </div>
  <script>
    document.getElementById('run').addEventListener('click', async () => {
      const raw = document.getElementById('prompts').value;
      const context = document.getElementById('context').value;
      const prompts = raw.split('\n').map(l => l.trim()).filter(Boolean);
      const out = document.getElementById('out');
      out.textContent = 'Processing…';
      const result = await window['ai_edge_gallery_get_result'](
        JSON.stringify({ prompts, context })
      );
      out.textContent = result;
    });
  </script>
</body>
</html>
