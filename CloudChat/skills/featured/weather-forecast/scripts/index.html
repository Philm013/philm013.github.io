<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"></head>
<body>
<script>
window['ai_edge_gallery_get_result'] = async (dataStr) => {
  try {
    const params = JSON.parse(dataStr);
    const location = String(params.location || '').trim();
    if (!location) return JSON.stringify({ error: 'No location provided.' });

    // Step 1: Geocode location to lat/lon
    const geoUrl = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(location)}&count=1&language=en&format=json`;
    const geoRes = await fetch(geoUrl, { signal: AbortSignal.timeout(8000) });
    if (!geoRes.ok) throw new Error('Geocoding failed: ' + geoRes.status);
    const geoData = await geoRes.json();
    if (!geoData.results || !geoData.results.length) {
      return JSON.stringify({ error: `Could not find location: "${location}"` });
    }
    const place = geoData.results[0];
    const lat = place.latitude;
    const lon = place.longitude;
    const displayName = `${place.name}${place.admin1 ? ', ' + place.admin1 : ''}${place.country ? ', ' + place.country : ''}`;

    // Step 2: Fetch 7-day forecast
    const forecastUrl = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
      `&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code,precipitation` +
      `&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,weather_code,wind_speed_10m_max` +
      `&timezone=auto&forecast_days=7`;
    const forecastRes = await fetch(forecastUrl, { signal: AbortSignal.timeout(8000) });
    if (!forecastRes.ok) throw new Error('Forecast fetch failed: ' + forecastRes.status);
    const data = await forecastRes.json();

    const current = data.current;
    const daily = data.daily;

    const wmoDescription = (code) => {
      const map = {0:'Clear sky',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',45:'Foggy',48:'Icy fog',
        51:'Light drizzle',53:'Moderate drizzle',55:'Dense drizzle',61:'Slight rain',63:'Moderate rain',
        65:'Heavy rain',71:'Slight snow',73:'Moderate snow',75:'Heavy snow',77:'Snow grains',
        80:'Slight showers',81:'Moderate showers',82:'Violent showers',85:'Slight snow showers',
        86:'Heavy snow showers',95:'Thunderstorm',96:'Thunderstorm with slight hail',99:'Thunderstorm with heavy hail'};
      return map[code] || 'Unknown';
    };

    const forecast = daily.time.map((date, i) => ({
      date,
      condition: wmoDescription(daily.weather_code[i]),
      high: `${daily.temperature_2m_max[i]}°C`,
      low: `${daily.temperature_2m_min[i]}°C`,
      precipitation: `${daily.precipitation_sum[i]}mm`,
      maxWind: `${daily.wind_speed_10m_max[i]} km/h`
    }));

    return JSON.stringify({
      result: {
        location: displayName,
        coordinates: { lat: lat.toFixed(4), lon: lon.toFixed(4) },
        current: {
          condition: wmoDescription(current.weather_code),
          temperature: `${current.temperature_2m}°C`,
          humidity: `${current.relative_humidity_2m}%`,
          wind: `${current.wind_speed_10m} km/h`,
          precipitation: `${current.precipitation}mm`
        },
        forecast
      }
    });
  } catch (e) {
    return JSON.stringify({ error: e.message });
  }
};
</script>
</body>
</html>
