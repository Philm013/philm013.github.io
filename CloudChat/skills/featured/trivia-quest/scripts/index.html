<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"></head>
<body>
<script>
window['ai_edge_gallery_get_result'] = async (dataStr) => {
  try {
    const params = JSON.parse(dataStr);
    const amount = Math.max(1, Math.min(15, parseInt(params.amount, 10) || 5));
    const category = params.category ? `&category=${parseInt(params.category)}` : '';
    const difficulty = ['easy', 'medium', 'hard'].includes(String(params.difficulty || '').toLowerCase())
      ? `&difficulty=${params.difficulty.toLowerCase()}` : '';

    const url = `https://opentdb.com/api.php?amount=${amount}&type=multiple${category}${difficulty}&encode=url3986`;
    const res = await fetch(url, { signal: AbortSignal.timeout(10000) });
    if (!res.ok) throw new Error('Open Trivia DB failed: ' + res.status);
    const data = await res.json();

    if (data.response_code !== 0 || !data.results || !data.results.length) {
      return JSON.stringify({ error: 'No trivia questions available for these parameters. Try different settings.' });
    }

    const decode = (s) => decodeURIComponent(s);
    const questions = data.results.map(q => {
      const allAnswers = [
        ...q.incorrect_answers.map(decode),
        decode(q.correct_answer)
      ].sort(() => Math.random() - 0.5);

      const letters = ['A', 'B', 'C', 'D'];
      return {
        category: decode(q.category),
        difficulty: q.difficulty,
        question: decode(q.question),
        choices: allAnswers.map((ans, i) => ({ letter: letters[i], text: ans })),
        correctIndex: allAnswers.indexOf(decode(q.correct_answer))
      };
    });

    return JSON.stringify({
      result: {
        type: 'trivia_session',
        totalQuestions: questions.length,
        questions,
        instructions: 'An interactive trivia session widget has been rendered in the chat. The user can play directly by clicking answer buttons. React to their performance after they finish!'
      }
    });
  } catch (e) {
    return JSON.stringify({ error: e.message });
  }
};
</script>
</body>
</html>
