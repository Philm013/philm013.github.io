<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"></head>
<body>
<script>
window['ai_edge_gallery_get_result'] = async (dataStr) => {
  try {
    const params = JSON.parse(dataStr);
    const location = String(params.location || '').trim();
    const startDate = String(params.start_date || '').trim();
    const endDate = String(params.end_date || '').trim();
    if (!location) return JSON.stringify({ error: 'No location provided.' });
    if (!startDate || !endDate) return JSON.stringify({ error: 'start_date and end_date are required (YYYY-MM-DD format).' });

    // Geocode
    const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(location)}&count=1&language=en&format=json`, { signal: AbortSignal.timeout(8000) });
    const geoData = await geoRes.json();
    if (!geoData.results || !geoData.results.length) {
      return JSON.stringify({ error: `Could not find location: "${location}"` });
    }
    const place = geoData.results[0];
    const lat = place.latitude;
    const lon = place.longitude;
    const displayName = `${place.name}${place.country ? ', ' + place.country : ''}`;

    // Historical data
    const archiveUrl = `https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}` +
      `&start_date=${startDate}&end_date=${endDate}` +
      `&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,wind_speed_10m_max` +
      `&timezone=auto`;
    const archiveRes = await fetch(archiveUrl, { signal: AbortSignal.timeout(10000) });
    if (!archiveRes.ok) throw new Error('Archive API failed: ' + archiveRes.status);
    const data = await archiveRes.json();
    const d = data.daily;
    if (!d || !d.time || !d.time.length) {
      return JSON.stringify({ error: 'No historical data available for the specified date range.' });
    }

    const maxTemps = d.temperature_2m_max.filter(v => v !== null);
    const minTemps = d.temperature_2m_min.filter(v => v !== null);
    const precip = d.precipitation_sum.filter(v => v !== null);

    const hottest = { value: Math.max(...maxTemps), date: d.time[d.temperature_2m_max.indexOf(Math.max(...maxTemps))] };
    const coldest = { value: Math.min(...minTemps), date: d.time[d.temperature_2m_min.indexOf(Math.min(...minTemps))] };
    const totalPrecip = precip.reduce((s, v) => s + v, 0).toFixed(1);
    const avgMax = (maxTemps.reduce((s, v) => s + v, 0) / maxTemps.length).toFixed(1);
    const avgMin = (minTemps.reduce((s, v) => s + v, 0) / minTemps.length).toFixed(1);

    // Sample up to 10 days for the detail list
    const step = Math.max(1, Math.floor(d.time.length / 10));
    const sample = d.time.filter((_, i) => i % step === 0).slice(0, 10).map((date, si) => {
      const idx = d.time.indexOf(date);
      return { date, high: `${d.temperature_2m_max[idx]}°C`, low: `${d.temperature_2m_min[idx]}°C`, precipitation: `${d.precipitation_sum[idx]}mm` };
    });

    return JSON.stringify({
      result: {
        location: displayName,
        period: { start: startDate, end: endDate, days: d.time.length },
        summary: {
          averageHigh: `${avgMax}°C`,
          averageLow: `${avgMin}°C`,
          hottestDay: { date: hottest.date, temp: `${hottest.value}°C` },
          coldestDay: { date: coldest.date, temp: `${coldest.value}°C` },
          totalPrecipitation: `${totalPrecip}mm`
        },
        sample
      }
    });
  } catch (e) {
    return JSON.stringify({ error: e.message });
  }
};
</script>
</body>
</html>
