<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Store Memory</title>
</head>
<body>
  <script>
    const MEMORY_DB_KEY = 'cloudchat_memories';

    function loadMemories() {
      try {
        const raw = localStorage.getItem(MEMORY_DB_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch {
        return [];
      }
    }

    function saveMemories(memories) {
      localStorage.setItem(MEMORY_DB_KEY, JSON.stringify(memories));
    }

    window['ai_edge_gallery_get_result'] = async (data) => {
      try {
        const jsonData = JSON.parse(data);
        const content = String(jsonData.content || '').trim();
        const category = String(jsonData.category || 'fact').trim();

        if (!content) {
          return JSON.stringify({ error: 'No content provided to store.' });
        }

        const memories = loadMemories();
        const entry = {
          id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
          content,
          category,
          timestamp: new Date().toISOString()
        };
        memories.push(entry);
        saveMemories(memories);

        return JSON.stringify({
          result: 'Memory stored successfully.',
          stored: true,
          id: entry.id,
          category: entry.category,
          total: memories.length
        });
      } catch (e) {
        return JSON.stringify({ error: 'Failed to store memory: ' + e.message });
      }
    };
  </script>

  <!-- Local test UI -->
  <div style="margin:20px;padding:20px;border:1px solid #ccc;font-family:sans-serif">
    <h3>Store Memory — Test</h3>
    <input id="content" type="text" placeholder="Content to store"
      style="width:300px;padding:8px;font-size:14px">
    <input id="category" type="text" placeholder="Category (default: fact)"
      style="width:160px;padding:8px;font-size:14px;margin-left:8px">
    <button id="run" style="padding:8px 16px;margin-left:8px;cursor:pointer">Store</button>
    <pre id="out" style="margin-top:12px;padding:10px;background:#f4f4f4;font-size:13px"></pre>
  </div>
  <script>
    document.getElementById('run').addEventListener('click', async () => {
      const content = document.getElementById('content').value;
      const category = document.getElementById('category').value || 'fact';
      const out = document.getElementById('out');
      out.textContent = 'Storing…';
      const result = await window['ai_edge_gallery_get_result'](
        JSON.stringify({ content, category })
      );
      out.textContent = result;
    });
  </script>
</body>
</html>
