<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Search</title>
</head>
<body>
  <script>
    /**
     * Search via Brave Search API
     * @param {string} query
     * @param {string} apiKey
     */
    async function searchBrave(query, apiKey) {
      const url = 'https://api.search.brave.com/res/v1/web/search?q=' +
        encodeURIComponent(query) + '&count=5&text_decorations=false&search_lang=en';
      const res = await fetch(url, {
        headers: { 'Accept': 'application/json', 'X-Subscription-Token': apiKey }
      });
      if (!res.ok) throw new Error('Brave API error ' + res.status);
      const data = await res.json();
      return (data.web && data.web.results ? data.web.results : []).map(r => ({
        title: r.title,
        url: r.url,
        snippet: r.description || ''
      }));
    }

    /**
     * Search via Tavily API
     * @param {string} query
     * @param {string} apiKey
     */
    async function searchTavily(query, apiKey) {
      const res = await fetch('https://api.tavily.com/search', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ api_key: apiKey, query, max_results: 5, search_depth: 'basic' })
      });
      if (!res.ok) throw new Error('Tavily API error ' + res.status);
      const data = await res.json();
      return (data.results || []).map(r => ({
        title: r.title,
        url: r.url,
        snippet: r.content || ''
      }));
    }

    /**
     * Search via SearXNG instance
     * @param {string} query
     * @param {string} baseUrl
     */
    async function searchSearxng(query, baseUrl) {
      const url = baseUrl.replace(/\/$/, '') +
        '/search?q=' + encodeURIComponent(query) + '&format=json&engines=google,bing';
      const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
      if (!res.ok) throw new Error('SearXNG error ' + res.status);
      const data = await res.json();
      return (data.results || []).slice(0, 5).map(r => ({
        title: r.title,
        url: r.url,
        snippet: r.content || ''
      }));
    }

    window['ai_edge_gallery_get_result'] = async (data, secret) => {
      try {
        const jsonData = JSON.parse(data);
        const query = String(jsonData.query || '').trim();
        const provider = String(jsonData.provider || 'brave').toLowerCase();
        const searxngUrl = String(jsonData.searxngUrl || '').trim();

        if (!query) {
          return JSON.stringify({ error: 'No search query provided.' });
        }

        let results = [];

        if (provider === 'tavily') {
          if (!secret) return JSON.stringify({ error: 'Tavily API key required.' });
          results = await searchTavily(query, secret);
        } else if (provider === 'searxng') {
          if (!searxngUrl) return JSON.stringify({ error: 'searxngUrl required for SearXNG provider.' });
          results = await searchSearxng(query, searxngUrl);
        } else {
          // Default: Brave
          if (!secret) return JSON.stringify({ error: 'Brave Search API key required.' });
          results = await searchBrave(query, secret);
        }

        if (!results.length) {
          return JSON.stringify({ results: [], message: 'No results found for: ' + query });
        }

        return JSON.stringify({ results, query, provider });
      } catch (e) {
        return JSON.stringify({ error: 'Web search failed: ' + e.message });
      }
    };
  </script>

  <!-- Local test UI -->
  <div style="margin:20px;padding:20px;border:1px solid #ccc;font-family:sans-serif">
    <h3>Web Search — Test</h3>
    <input id="query" type="text" placeholder="Search query"
      style="width:260px;padding:8px;font-size:14px">
    <select id="provider" style="padding:8px;margin-left:8px;font-size:14px">
      <option value="brave">Brave</option>
      <option value="tavily">Tavily</option>
      <option value="searxng">SearXNG</option>
    </select>
    <input id="apikey" type="password" placeholder="API key"
      style="width:200px;padding:8px;font-size:14px;margin-left:8px">
    <button id="run" style="padding:8px 16px;margin-left:8px;cursor:pointer">Search</button>
    <pre id="out" style="margin-top:12px;padding:10px;background:#f4f4f4;font-size:13px;white-space:pre-wrap"></pre>
  </div>
  <script>
    document.getElementById('run').addEventListener('click', async () => {
      const query = document.getElementById('query').value;
      const provider = document.getElementById('provider').value;
      const secret = document.getElementById('apikey').value;
      const out = document.getElementById('out');
      out.textContent = 'Searching…';
      const result = await window['ai_edge_gallery_get_result'](
        JSON.stringify({ query, provider }),
        secret
      );
      out.textContent = result;
    });
  </script>
</body>
</html>
