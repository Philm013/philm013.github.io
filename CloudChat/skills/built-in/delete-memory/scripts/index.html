<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delete Memory</title>
</head>
<body>
  <script>
    const MEMORY_DB_KEY = 'cloudchat_memories';

    function loadMemories() {
      try {
        const raw = localStorage.getItem(MEMORY_DB_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch {
        return [];
      }
    }

    function saveMemories(memories) {
      localStorage.setItem(MEMORY_DB_KEY, JSON.stringify(memories));
    }

    function scoreMatch(text, tokens) {
      const lower = text.toLowerCase();
      let hits = 0;
      for (const token of tokens) {
        if (lower.includes(token)) hits++;
      }
      return tokens.length > 0 ? hits / tokens.length : 0;
    }

    window['ai_edge_gallery_get_result'] = async (data) => {
      try {
        const jsonData = JSON.parse(data);
        const query = String(jsonData.query || '').trim();
        const categoryFilter = jsonData.category ? String(jsonData.category).trim() : null;
        const confirm = jsonData.confirm !== false; // default true

        if (!confirm) {
          return JSON.stringify({ error: 'Deletion not confirmed. Pass confirm: true to proceed.' });
        }

        const memories = loadMemories();
        const totalBefore = memories.length;

        // Wipe all
        if (query === '*') {
          const deletedCount = categoryFilter
            ? memories.filter(m => m.category === categoryFilter).length
            : totalBefore;
          const remaining = categoryFilter
            ? memories.filter(m => m.category !== categoryFilter)
            : [];
          saveMemories(remaining);
          return JSON.stringify({ result: 'Memories deleted.', deleted: deletedCount, remaining: remaining.length });
        }

        if (!query) {
          return JSON.stringify({ error: 'No query provided. Pass query: "*" to delete all.' });
        }

        const tokens = query.toLowerCase().split(/\s+/).filter(t => t.length > 1);

        const toDelete = memories.filter(m => {
          if (categoryFilter && m.category !== categoryFilter) return false;
          return scoreMatch(m.content, tokens) > 0;
        });

        const idsToDelete = new Set(toDelete.map(m => m.id));
        const remaining = memories.filter(m => !idsToDelete.has(m.id));
        saveMemories(remaining);

        return JSON.stringify({
          result: toDelete.length > 0 ? 'Memories deleted.' : 'No matching memories found.',
          deleted: toDelete.length,
          remaining: remaining.length
        });
      } catch (e) {
        return JSON.stringify({ error: 'Delete failed: ' + e.message });
      }
    };
  </script>

  <!-- Local test UI -->
  <div style="margin:20px;padding:20px;border:1px solid #ccc;font-family:sans-serif">
    <h3>Delete Memory — Test</h3>
    <input id="query" type="text" placeholder='Query or * for all'
      style="width:280px;padding:8px;font-size:14px">
    <button id="run" style="padding:8px 16px;margin-left:8px;cursor:pointer">Delete</button>
    <pre id="out" style="margin-top:12px;padding:10px;background:#f4f4f4;font-size:13px"></pre>
  </div>
  <script>
    document.getElementById('run').addEventListener('click', async () => {
      const query = document.getElementById('query').value;
      const out = document.getElementById('out');
      out.textContent = 'Deleting…';
      const result = await window['ai_edge_gallery_get_result'](
        JSON.stringify({ query, confirm: true })
      );
      out.textContent = result;
    });
  </script>
</body>
</html>
