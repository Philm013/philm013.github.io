<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fetch Page</title>
</head>
<body>
  <script>
    const PROXY_URL = 'https://api.allorigins.win/raw?url=';
    const MAX_CHARS = 3500;
    const TIMEOUT_MS = 10000;

    /**
     * Strip all script/style tags and HTML tags, collapse whitespace.
     * @param {string} html
     * @returns {string}
     */
    function extractText(html) {
      return html
        .replace(/<script[\s\S]*?<\/script>/gi, '')
        .replace(/<style[\s\S]*?<\/style>/gi, '')
        .replace(/<[^>]+>/g, ' ')
        .replace(/\s+/g, ' ')
        .trim()
        .slice(0, MAX_CHARS);
    }

    /**
     * Attempt a direct fetch, then fall back to CORS proxy.
     * @param {string} url
     * @returns {Promise<string>} raw HTML
     */
    async function fetchHtml(url) {
      const signal = AbortSignal.timeout(TIMEOUT_MS);
      try {
        const res = await fetch(url, { signal });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return await res.text();
      } catch {
        // Fallback via CORS proxy
        const proxyRes = await fetch(PROXY_URL + encodeURIComponent(url), {
          signal: AbortSignal.timeout(TIMEOUT_MS)
        });
        if (!proxyRes.ok) throw new Error('Proxy HTTP ' + proxyRes.status);
        return await proxyRes.text();
      }
    }

    window['ai_edge_gallery_get_result'] = async (data) => {
      try {
        const jsonData = JSON.parse(data);
        const url = String(jsonData.url || '').trim();

        if (!url) {
          return JSON.stringify({ error: 'No URL provided.' });
        }
        if (!/^https?:\/\//i.test(url)) {
          return JSON.stringify({ error: 'URL must start with http:// or https://' });
        }

        const html = await fetchHtml(url);
        const content = extractText(html);

        return JSON.stringify({ content, url, truncated: html.length > MAX_CHARS });
      } catch (e) {
        return JSON.stringify({ error: 'Failed to fetch page: ' + e.message });
      }
    };
  </script>

  <!-- Local test UI -->
  <div style="margin:20px;padding:20px;border:1px solid #ccc;font-family:sans-serif">
    <h3>Fetch Page — Test</h3>
    <input id="url" type="url" placeholder="https://example.com"
      style="width:360px;padding:8px;font-size:14px">
    <button id="run" style="padding:8px 16px;margin-left:8px;cursor:pointer">Fetch</button>
    <pre id="out" style="margin-top:12px;padding:10px;background:#f4f4f4;font-size:13px;white-space:pre-wrap;max-height:300px;overflow:auto"></pre>
  </div>
  <script>
    document.getElementById('run').addEventListener('click', async () => {
      const url = document.getElementById('url').value;
      const out = document.getElementById('out');
      out.textContent = 'Fetching…';
      const result = await window['ai_edge_gallery_get_result'](JSON.stringify({ url }));
      out.textContent = result;
    });
  </script>
</body>
</html>
